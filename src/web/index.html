<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CCTime — Расписание</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Страница расписания -->
    <div id="schedule-page">

        <!-- Шапка -->
        <header id="schedule-header">
            <div id="header-nav-row">
                <button id="btn-prev-week" type="button">&laquo;</button>
                <button id="btn-prev-day" type="button">&lsaquo;</button>
                <div id="header-center">
                    <div id="today-row">
                        <button id="btn-today" type="button">Сегодня</button>
                        <div id="date-picker-wrapper">
                            <button id="btn-calendar" type="button">&#x25BC;</button>
                            <input id="input-date-picker" type="date">
                        </div>
                        <button id="btn-refresh" type="button" title="Обновить">&#x21BB;</button>
                    </div>
                    <div id="header-week-range"></div>
                </div>
                <button id="btn-next-day" type="button">&rsaquo;</button>
                <button id="btn-next-week" type="button">&raquo;</button>
            </div>
        </header>

        <!-- Рабочая область -->
        <main id="schedule-main">
            <div id="schedule-date-row">
                <div id="date-time-label"></div>
                <div id="date-label"></div>
            </div>
            <div id="schedule-grid">
                <!-- Генерируется из JS -->
            </div>
        </main>

        <!-- Подвал -->
        <footer id="schedule-footer">
            <select id="select-view-mode">
                <option value="1">День</option>
                <option value="7">1 неделя</option>
                <option value="14">2 недели</option>
                <option value="21">3 недели</option>
                <option value="28">4 недели</option>
                <option value="35">5 недель</option>
                <option value="v7">Свод 1 нед.</option>
                <option value="v14">Свод 2 нед.</option>
                <option value="v21">Свод 3 нед.</option>
                <option value="v28">Свод 4 нед.</option>
                <option value="v35">Свод 5 нед.</option>
            </select>
            <a id="footer-link-clients" href="clients.html">Клиенты</a>
            <a id="footer-link-specialists" href="specialists.html">Специалисты</a>
        </footer>

    </div>

    <!-- Popup редактирования резерва -->
    <div id="reserve-modal" class="modal-overlay hidden">
        <div id="reserve-modal-content" class="modal-content">
            <h2 id="reserve-modal-title">Резерв</h2>
            <p id="reserve-modal-info"></p>

            <div class="form-group">
                <label id="label-specialist" for="select-specialist">Специалист</label>
                <div class="select-with-clear">
                    <select id="select-specialist"></select>
                    <button id="btn-clear-specialist" class="btn-clear" type="button" title="Сбросить">&times;</button>
                </div>
            </div>
            <div class="form-group form-row">
                <div class="form-row-weeks">
                    <label id="label-specialist-count" for="input-specialist-count">Недель</label>
                    <input id="input-specialist-count" type="number" min="1" value="1">
                </div>
                <div class="form-row-confirm">
                    <label id="label-specialist-confirm" for="check-specialist-confirm">Подтверждено</label>
                    <input id="check-specialist-confirm" type="checkbox">
                </div>
                <button id="btn-share-specialist" class="btn-share" type="button" title="Поделиться">&#x1F4E4;</button>
            </div>

            <hr>

            <div class="form-group">
                <label id="label-client" for="select-client">Клиент</label>
                <div class="select-with-clear">
                    <select id="select-client"></select>
                    <button id="btn-clear-client" class="btn-clear" type="button" title="Сбросить">&times;</button>
                </div>
            </div>
            <div class="form-group form-row">
                <div class="form-row-weeks">
                    <label id="label-client-count" for="input-client-count">Недель</label>
                    <input id="input-client-count" type="number" min="1" value="1">
                </div>
                <div class="form-row-confirm">
                    <label id="label-client-confirm" for="check-client-confirm">Подтверждено</label>
                    <input id="check-client-confirm" type="checkbox">
                </div>
                <button id="btn-share-client" class="btn-share" type="button" title="Поделиться">&#x1F4E4;</button>
            </div>

            <hr>

            <div class="form-group">
                <label id="label-comment" for="input-comment">Комментарий</label>
                <textarea id="input-comment" rows="3" maxlength="500" placeholder="До 500 символов"></textarea>
            </div>

            <div id="reserve-modal-errors" class="modal-errors hidden"></div>
            <div id="reserve-modal-overwrite" class="form-check hidden">
                <input id="check-force-overwrite" type="checkbox">
                <label id="label-force-overwrite" for="check-force-overwrite">Всё равно перезаписать</label>
            </div>

            <div id="reserve-modal-buttons">
                <button id="btn-reserve-save" type="button">Сохранить</button>
                <button id="btn-reserve-cancel" type="button">Закрыть</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
